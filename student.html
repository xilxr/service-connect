<!DOCTYPE html>
<html>
<head>
  <title>Find Help Fast</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h2 {
      color: #38bdf8;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🔧 Find Help Near You</h2>

<input id="msg" placeholder="Describe your problem..." />
<br>

<button onclick="send()">Find Help</button>

<h3>Available Workers</h3>
<div id="results"></div>

<script>
async function send() {
  let text = document.getElementById("msg").value;

  document.getElementById("results").innerHTML = "Searching...";

  let res = await fetch("https://service-backend-jezm.onrender.com/request", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  let data = await res.json();

  if (data.matches.length === 0) {
    document.getElementById("results").innerHTML =
      "<p>No verified workers found</p>";
    return;
  }

  let output = "";

  data.matches.forEach(biz => {
    output += `
      <div class="card">
        <h4>${biz.name}</h4>
        <p>${biz.service}</p>
        <button onclick="alert('Call feature coming soon')">Contact</button>
      </div>
    `;
  });

  document.getElementById("results").innerHTML = output;
}
</script>

</body>
</html>
