<!DOCTYPE html>
<html>
<head>
  <title>Student Help</title>
</head>
<body>

<h2>Student Help Center</h2>

<input id="msg" placeholder="Type your problem (e.g generator issue)" />
<br><br>

<button onclick="send()">Send</button>

<h3>Results:</h3>
<div id="results"></div>

<script>
async function send() {
  let text = document.getElementById("msg").value;

  document.getElementById("results").innerText = "Searching...";

  try {
    let res = await fetch("https://service-backend-jezm.onrender.com/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    let data = await res.json();

    if (data.matches.length === 0) {
      document.getElementById("results").innerText =
        "No verified service providers found.";
      return;
    }

    let output = "<ul>";

    data.matches.forEach(biz => {
      output += "<li>" + biz.name + " (" + biz.service + ")</li>";
    });

    output += "</ul>";

    document.getElementById("results").innerHTML = output;

  } catch (error) {
    document.getElementById("results").innerText =
      "Error connecting to server";
  }
}
</script>

</body>
</html>
