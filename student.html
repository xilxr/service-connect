<!DOCTYPE html>
<html>
<head>
  <title>Student Help</title>
</head>
<body>

<h2>Student Help Center</h2>

<input id="msg" placeholder="Type your problem (e.g generator issue)" />
<br><br>

<button onclick="send()">Send</button>

<p id="reply"></p>

<script>
async function send() {
  let text = document.getElementById("msg").value;

  // check empty input
  if (!text) {
    document.getElementById("reply").innerText = "Please type a problem first.";
    return;
  }

  document.getElementById("reply").innerText = "Sending request...";

  try {
    let res = await fetch("YOUR_BACKEND_LINK/request", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    let data = await res.json();

    document.getElementById("reply").innerText =
      "Request saved ✔ ID: " + data.request.id;

  } catch (error) {
    document.getElementById("reply").innerText =
      "Cannot reach server. Check your backend link.";
  }
}
</script>

</body>
</html>
