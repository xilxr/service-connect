<h2>Student Help</h2>

<input id="msg" placeholder="Type your problem" />
<button onclick="send()">Send</button>

<p id="reply"></p>

<script>
function send() {
  let text = document.getElementById("msg").value;

  let response = "We are checking your request...";

  if (text.includes("generator")) {
    response = "We found a generator mechanic near you.";
  }

  if (text.includes("urgent")) {
    response = "Finding fastest help for you...";
  }

  document.getElementById("reply").innerText = response;
}
</script>
