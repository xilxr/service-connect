<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
</head>
<body>

<h2>Admin Dashboard</h2>

<button onclick="loadBusinesses()">Load Businesses</button>

<div id="list"></div>

<script>
async function loadBusinesses() {
  document.getElementById("list").innerText = "Loading...";

  try {
    let res = await fetch("https://service-backend-jezm.onrender.com/admin/businesses");
    let data = await res.json();

    let output = "";

    data.forEach(b => {
      output += `
        <div style="border:1px solid black; margin:10px; padding:10px;">
          <p><b>ID:</b> ${b._id}</p>
          <p><b>Name:</b> ${b.name}</p>
          <p><b>Service:</b> ${b.service}</p>
          <p><b>Paid:</b> ${b.paid}</p>
          <p><b>Verified:</b> ${b.verified}</p>
          <button onclick="approve('${b._id}')">Approve</button>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = output;

  } catch (error) {
    document.getElementById("list").innerText = "Error loading data";
  }
}

async function approve(id) {
  let res = await fetch("https://service-backend-jezm.onrender.com/admin/approve", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  let data = await res.json();

  alert(data.message || data.error);

  loadBusinesses(); // refresh list
}
</script>

</body>
</html>
