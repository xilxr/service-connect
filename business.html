<!DOCTYPE html>
<html>
<head>
  <title>Join as Worker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: #22c55e;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>💼 Register Your Service</h2>

<input id="name" placeholder="Your Name">
<input id="service" placeholder="Your Service (mechanic, plumber...)">
<input id="location" placeholder="Your Location (e.g futo)">
<input id="phone" placeholder="Your WhatsApp Number (080...)">

<button id="registerBtn">Register</button>

<p id="result"></p>

<hr>

<h3>💳 Pay ₦2000 to Activate</h3>

<!-- OPay Image -->
<img src="https://i.ibb.co/Pvz0zyVZ/1777417845030.png" style="width:90%; border-radius:10px; margin-top:10px;">

<p>
After payment, use this as your <b>Remark:</b>
</p>

<p id="remarkBox" style="color:#22c55e; font-weight:bold;"></p>

<button id="copyBtn">Copy Remark</button>

<br><br>

<!-- Send proof button to WhatsApp -->
<button id="whatsAppBtn">Send Proof on WhatsApp</button>

<!-- I Have Paid Button -->
<button id="paidBtn">I Have Paid</button>

<hr>

<!-- Business Profile Update Section -->
<h3>Update Your Business Profile</h3>

<img src="business_profile_picture_url" id="profilePicturePreview" style="width:100px; height:100px; border-radius:50%;" />

<input type="file" id="profilePictureInput" accept="image/*" />
<input id="shortBio" placeholder="Short Bio">

<button id="updateProfileBtn">Update Profile</button>

<script>
// Define global variable for the generated remark
let generatedRemark = "";

// Function to generate unique remark
function generateRemark(name, service, location) {
  let unique = Math.floor(Math.random() * 100000); // Generate random number
  generatedRemark = name + "-" + service + "-" + location + "-" + unique; // Create remark
  document.getElementById("remarkBox").innerText = generatedRemark; // Display remark
}

// Register function triggered by button
async function register() {
  try {
    // Get values from input fields
    let name = document.getElementById("name").value;
    let service = document.getElementById("service").value;
    let location = document.getElementById("location").value;
    let phone = document.getElementById("phone").value;

    // Check if all fields are filled
    if (!name || !service || !location || !phone) {
      alert("Please fill all fields.");
      return;  // Stop the function if fields are empty
    }

    // Send POST request to register the business
    let res = await fetch("https://service-backend-jezm.onrender.com/business/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, service, location, phone })  // Sending data as JSON
    });

    // Handle response from the backend
    let data = await res.json();

    if (res.ok) {
      document.getElementById("result").innerText = "Your ID: " + data.business._id;
      generateRemark(name, service, location);  // Generate remark after registration
    } else {
      alert("Error registering business: " + data.error);  // Show error from backend
    }
  } catch (err) {
    console.error("Error during registration:", err);  // Log any errors
    alert("An error occurred while registering.");
  }
}

// Function to copy remark to clipboard
function copyRemark() {
  navigator.clipboard.writeText(generatedRemark);  // Copy the remark to clipboard
  alert("Remark copied ✔");
}

// Function to open WhatsApp with payment proof
function openWhatsApp() {
  let phone = "2348107661212";  // Your customer care phone number
  let message = "Hello, I have made payment.\n\nRemark: " + generatedRemark;  // Payment message
  let link = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);  // WhatsApp link
  window.open(link, "_blank");  // Open WhatsApp chat in a new tab
}

// Function to mark payment as completed (I Have Paid)
async function markPaid() {
  const businessId = "business_id_here"; // Replace with actual business ID from registration

  if (!businessId) {
    alert("Business ID is missing. Please register first.");
    return;
  }

  try {
    // Send POST request to mark the payment as completed
    let res = await fetch("https://service-backend-jezm.onrender.com/business/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id: businessId })  // Sending business ID to mark as paid
    });

    // Handle response from backend
    let data = await res.json();

    if (res.ok) {
      alert("Your payment has been successfully marked.");
    } else {
      alert("Error marking payment: " + data.error);  // Show error message from backend
    }
  } catch (error) {
    console.error("Error marking payment:", error);  // Log any errors
    alert("An error occurred while marking payment.");
  }
}

// Handle profile picture preview
document.getElementById("profilePictureInput").addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onloadend = function() {
      document.getElementById("profilePicturePreview").src = reader.result;
    };
    reader.readAsDataURL(file);
  }
});

// Handle profile update button click
document.getElementById("updateProfileBtn").addEventListener("click", async function() {
  const businessId = "business_id_here"; // Replace with actual business ID
  const profilePicture = document.getElementById("profilePictureInput").files[0] ? document.getElementById("profilePictureInput").files[0].name : "";
  const shortBio = document.getElementById("shortBio").value;

  const res = await fetch("https://service-backend-jezm.onrender.com/business/updateProfile", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id: businessId, profilePicture, shortBio })
  });

  const data = await res.json();
  if (data.message === "Profile updated ✔") {
    alert("Your profile has been updated.");
  } else {
    alert("Error updating profile.");
  }
});

// Add event listeners to the buttons
document.getElementById("registerBtn").addEventListener("click", register); // Register button
document.getElementById("copyBtn").addEventListener("click", copyRemark); // Copy Remark button
document.getElementById("whatsAppBtn").addEventListener("click", openWhatsApp); // WhatsApp button
document.getElementById("paidBtn").addEventListener("click", markPaid); // I Have Paid button
</script>

</body>
</html>
