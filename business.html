<!DOCTYPE html>
<html>
<head>
  <title>Join as Worker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: #22c55e;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>💼 Register Your Service</h2>

<input id="name" placeholder="Your Name">
<input id="service" placeholder="Your Service (mechanic, plumber...)">
<input id="location" placeholder="Your Location (e.g futo)">
<input id="phone" placeholder="Your WhatsApp Number (080...)">

<button onclick="register()">Register</button>

<p id="result"></p>

<hr>

<h3>Activate Account (₦2000)</h3>

<input id="payId" placeholder="Enter your ID">

<button onclick="pay()">I Have Paid</button>

<p id="payResult"></p>

<script>
const BASE_URL = "https://service-backend-jezm.onrender.com";

async function register() {
  try {
    let name = document.getElementById("name").value;
    let service = document.getElementById("service").value;
    let location = document.getElementById("location").value;
    let phone = document.getElementById("phone").value;

    if (!name || !service || !location || !phone) {
      alert("Fill all fields");
      return;
    }

    let res = await fetch(BASE_URL + "/business/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, service, location, phone })
    });

    let data = await res.json();

    console.log(data);

    document.getElementById("result").innerText =
      "Your ID: " + data.business._id;

  } catch (err) {
    console.error(err);
    alert("Error registering");
  }
}

async function pay() {
  try {
    let id = document.getElementById("payId").value;

    if (!id) {
      alert("Enter your ID");
      return;
    }

    let res = await fetch(BASE_URL + "/business/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id })
    });

    let data = await res.json();

    console.log(data);

    document.getElementById("payResult").innerText =
      data.message || data.error;

  } catch (err) {
    console.error(err);
    alert("Error processing payment");
  }
}
</script>

</body>
</html>
