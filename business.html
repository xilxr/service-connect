<!DOCTYPE html>
<html>
<head>
  <title>Business Signup</title>
</head>
<body>

<h2>Register Business</h2>

<input id="name" placeholder="Name" />
<br><br>

<input id="service" placeholder="Service (mechanic, plumber...)" />
<br><br>

<button onclick="register()">Register</button>

<p id="result"></p>

<hr>

<h3>Pay ₦2000</h3>
<p>Send to: 0000000000 (Your Bank)</p>

<input id="payId" placeholder="Enter your ID" />
<br><br>

<button onclick="pay()">I Have Paid</button>

<p id="payResult"></p>

<script>
async function register() {
  let name = document.getElementById("name").value;
  let service = document.getElementById("service").value;

  let res = await fetch("https://service-backend-jezm.onrender.com/business/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, service })
  });

  let data = await res.json();

  document.getElementById("result").innerText =
    "Your ID: " + data.business.id;
}

async function pay() {
  let id = document.getElementById("payId").value;

  let res = await fetch("https://service-backend-jezm.onrender.com/business/pay", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  let data = await res.json();

  document.getElementById("payResult").innerText = data.message;
}
</script>

</body>
</html>
