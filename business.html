<!DOCTYPE html>
<html>
<head>
  <title>Join as Worker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: #22c55e;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>💼 Register Your Service</h2>

<input id="name" placeholder="Your Name">
<input id="service" placeholder="Your Service (mechanic, plumber...)">

<button onclick="register()">Register</button>

<p id="result"></p>

<hr>

<h3>Activate Account (₦2000)</h3>
<p>Send payment to your account</p>

<input id="payId" placeholder="Enter your ID">

<button onclick="pay()">I Have Paid</button>

<p id="payResult"></p>

<script>
async function register() {
  let name = document.getElementById("name").value;
  let service = document.getElementById("service").value;

  let res = await fetch("https://service-backend-jezm.onrender.com/business/signup", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, service })
  });

  let data = await res.json();

  document.getElementById("result").innerText =
    "Your ID: " + data.business._id;
}

async function pay() {
  let id = document.getElementById("payId").value;

  let res = await fetch("https://service-backend-jezm.onrender.com/business/pay", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ id })
  });

  let data = await res.json();

  document.getElementById("payResult").innerText = data.message;
}
</script>

</body>
</html>
