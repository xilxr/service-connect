<!DOCTYPE html>
<html>
<head>
  <title>Join as Worker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    button {
      padding: 12px;
      margin-top: 10px;
      border: none;
      background: #22c55e;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>💼 Register Your Service</h2>

<input id="name" placeholder="Your Name">
<input id="service" placeholder="Your Service (mechanic, plumber...)">
<input id="location" placeholder="Your Location (e.g futo)">
<input id="phone" placeholder="Your WhatsApp Number (080...)">

<button id="registerBtn">Register</button>

<p id="result"></p>

<hr>

<h3>💳 Pay ₦2000 to Activate</h3>

<!-- OPay Image -->
<img src="https://i.ibb.co/Pvz0zyVZ/1777417845030.png" style="width:90%; border-radius:10px; margin-top:10px;">

<p>
After payment, use this as your <b>Remark:</b>
</p>

<p id="remarkBox" style="color:#22c55e; font-weight:bold;"></p>

<button id="copyBtn">Copy Remark</button>

<br><br>

<!-- Send proof button to WhatsApp -->
<button id="whatsAppBtn">Send Proof on WhatsApp</button>

<!-- I Have Paid Button -->
<button id="paidBtn">I Have Paid</button>

<script>
// Define global variable for the generated remark
let generatedRemark = "";

// Function to generate unique remark
function generateRemark(name, service, location) {
  let unique = Math.floor(Math.random() * 100000); // Generate random number
  generatedRemark = name + "-" + service + "-" + location + "-" + unique; // Create remark
  document.getElementById("remarkBox").innerText = generatedRemark; // Display remark
}

// Register function triggered by button
async function register() {
  try {
    let name = document.getElementById("name").value;
    let service = document.getElementById("service").value;
    let location = document.getElementById("location").value;
    let phone = document.getElementById("phone").value;

    if (!name || !service || !location || !phone) {
      alert("Fill all fields");
      return;
    }

    let res = await fetch("https://service-backend-jezm.onrender.com/business/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, service, location, phone })
    });

    let data = await res.json();

    document.getElementById("result").innerText =
      "Your ID: " + data.business._id;

    generateRemark(name, service, location); // Generate remark after registration
  } catch (err) {
    console.error(err);
    alert("Error registering");
  }
}

// Function to copy remark to clipboard
function copyRemark() {
  navigator.clipboard.writeText(generatedRemark);  // Copy the remark to clipboard
  alert("Remark copied ✔");
}

// Function to open WhatsApp with payment proof
function openWhatsApp() {
  let phone = "2348107661212";  // Your customer care phone number
  let message = "Hello, I have made payment.\n\nRemark: " + generatedRemark;  // Payment message
  let link = "https://wa.me/" + phone + "?text=" + encodeURIComponent(message);  // WhatsApp link
  window.open(link, "_blank");  // Open WhatsApp chat in a new tab
}

// Function to mark payment as completed (I Have Paid)
async function markPaid() {
  const businessId = "business_id_here"; // Replace with the actual business ID

  try {
    let res = await fetch("https://service-backend-jezm.onrender.com/business/pay", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ id: businessId })
    });

    let data = await res.json();

    if (data.message === "Payment submitted ✔") {
      alert("Your payment has been successfully marked.");
    } else {
      alert("There was an issue marking your payment.");
    }
  } catch (error) {
    console.error("Error marking payment:", error);
    alert("Something went wrong, please try again.");
  }
}

// Add event listeners to the buttons
document.getElementById("registerBtn").addEventListener("click", register); // Register button
document.getElementById("copyBtn").addEventListener("click", copyRemark); // Copy Remark button
document.getElementById("whatsAppBtn").addEventListener("click", openWhatsApp); // WhatsApp button
document.getElementById("paidBtn").addEventListener("click", markPaid); // I Have Paid button
</script>

</body>
</html>
